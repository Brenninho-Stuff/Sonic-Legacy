name: Android Build - Sonic Legacy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ☕ Java
      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 📱 Android
      - uses: android-actions/setup-android@v3

      - name: Install Android SDK + NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"

      # 🧠 Haxe
      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install libs
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-ui

      # 🔧 ENV (ESSENCIAL)
      - name: Set environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      # 🔥 SETUP REAL DO LIME (SEM "yes")
      - name: Lime setup android (real fix)
        run: |
          haxelib run lime setup android

      # 🔥 GARANTIA EXTRA (fallback)
      - name: Force Lime config
        run: |
          mkdir -p ~/.lime
          cat <<EOF > ~/.lime/config.xml
          <?xml version="1.0" encoding="utf-8"?>
          <project>
            <android sdk="$ANDROID_HOME" ndk="$ANDROID_HOME/ndk/25.2.9519653" />
          </project>
          EOF

      # 📱 Build
      - name: Build APK
        run: |
          haxelib run openfl build android -release

      - uses: actions/upload-artifact@v4
        with:
          name: SonicLegacy-APK
          path: export/android/bin/app/build/outputs/apk/release/*.apk