name: Android Build - Sonic Legacy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_HOME: ${{ env.ANDROID_HOME }}
      ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Dependencies
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"

      - name: Export Android Paths (FIX CRÍTICO)
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install Haxe Libraries
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-ui

      # 🔥 ESSE É O SEGREDO
      - name: Setup Lime Android (FORÇADO)
        run: |
          yes | haxelib run lime setup android

      - name: Build APK
        run: |
          haxelib run openfl build android -release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SonicLegacy-APK
          path: export/android/bin/app/build/outputs/apk/release/*.apk