name: Android Build - Sonic Legacy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - uses: actions/checkout@v4

      # ☕ Java
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 📱 Android SDK
      - uses: android-actions/setup-android@v3

      # 🔐 Licenças + NDK
      - name: Install Android Dependencies
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"

      # 🧠 Haxe
      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      # 📦 Libs
      - name: Install Haxe Libraries
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-ui

      # ⚙️ Setup Lime/OpenFL (FORÇADO)
      - name: Setup Lime
        run: |
          haxelib run lime setup
          mkdir -p ~/.lime
          echo '<?xml version="1.0" encoding="utf-8"?>
<project>
  <android sdk="$ANDROID_HOME" ndk="$ANDROID_HOME/ndk/25.2.9519653" />
</project>' > ~/.lime/config.xml

      # 📱 Build
      - name: Build APK
        run: |
          haxelib run openfl build android -release

      # 📤 Upload
      - uses: actions/upload-artifact@v4
        with:
          name: SonicLegacy-APK
          path: export/android/bin/app/build/outputs/apk/release/*.apk