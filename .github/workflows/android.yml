name: Android Build - Sonic Legacy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clonar repositório
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 📱 Instalar Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 🔐 Aceitar licenças
      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      # 🧠 Haxe
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      # 📦 Libs
      - name: Install Haxe Libraries
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-ui

      # ⚙️ Setup OpenFL
      - name: Setup OpenFL
        run: |
          haxelib run lime setup
          haxelib run openfl setup

      # 🧠 EXPORTAR VARIÁVEIS (ESSENCIAL)
      - name: Set Android Environment Variables
        run: |
          echo "ANDROID_SDK=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_HOME" >> $GITHUB_ENV

      # 📱 Build APK
      - name: Build APK
        run: |
          haxelib run openfl build android -release

      # 📤 Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SonicLegacy-APK
          path: export/android/bin/app/build/outputs/apk/debug/*.apk