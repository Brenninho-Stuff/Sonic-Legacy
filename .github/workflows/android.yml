name: Android Build - Sonic Legacy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK + NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"

      - uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      - name: Install Haxe libs
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-ui

      - name: Export Android paths
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Setup Lime Android
        run: |
          yes | haxelib run lime setup android

      - name: Build APK
        run: |
          haxelib run openfl build android -release

      - uses: actions/upload-artifact@v4
        with:
          name: SonicLegacy-APK
          path: export/android/bin/app/build/outputs/apk/release/*.apk