name: Android Build - Sonic Legacy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Clonar repositório
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Configurar Java corretamente
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 📱 Instalar Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 📦 Instalar SDK + NDK + aceitar licenças
      - name: Install Android dependencies
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.2.9519653"

      # 🧠 Instalar Haxe
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.7

      # 📦 Instalar bibliotecas
      - name: Install Haxe libraries
        run: |
          haxelib install lime
          haxelib install openfl
          haxelib install flixel
          haxelib install flixel-addons
          haxelib install flixel-ui

      # 🔧 Corrigir variáveis do Android
      - name: Set Android environment
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      # 🧠 Configuração manual do Lime (sem bug)
      - name: Configure Lime
        run: |
          mkdir -p ~/.lime
          cat <<EOF > ~/.lime/config.xml
          <?xml version="1.0" encoding="utf-8"?>
          <project>
            <android sdk="$ANDROID_HOME" ndk="$ANDROID_HOME/ndk/25.2.9519653" />
          </project>
          EOF

      # 📱 Build APK
      - name: Build Android APK
        run: |
          haxelib run openfl build android -release

      # 📤 Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SonicLegacy-APK
          path: export/android/bin/app/build/outputs/apk/release/*.apk